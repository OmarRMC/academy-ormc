<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1622" />
      <stop offset="1" stop-color="#0f1f30" />
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.12" r="0.6">
      <stop offset="0" stop-color="#61DAFB" stop-opacity="0.20" />
      <stop offset="1" stop-color="#61DAFB" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect x="24" y="24" width="1152" height="582" rx="28" fill="none" stroke="#61DAFB" stroke-opacity="0.18" stroke-width="2" />

  <!-- Marca de código </> (logo, arriba a la izquierda) -->
  <g transform="translate(84,86) scale(4.2)" fill="none" stroke="#61DAFB" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
    <path d="m18 16 4-4-4-4" />
    <path d="m6 8-4 4 4 4" />
    <path d="m14.5 4-5 16" />
  </g>

  <!-- Título y subtítulo -->
  <text x="86" y="258" font-family="Segoe UI, Arial, sans-serif" font-size="80" font-weight="800" fill="#ffffff">
    OmarRMC <tspan fill="#61DAFB">Academy</tspan>
  </text>
  <text x="88" y="312" font-family="Segoe UI, Arial, sans-serif" font-size="32" fill="#9db4c7">
    Cursos y talleres prácticos de desarrollo web moderno
  </text>

  <!-- Sección: Tecnologías -->
  <text x="88" y="382" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="4" fill="#5d7488">TECNOLOGÍAS</text>

  <g font-family="Segoe UI, Arial, sans-serif" font-size="28">
    <!-- Frontend -->
    <text x="88" y="430" fill="#9db4c7" font-weight="700">Frontend</text>
    <g transform="translate(270,409) scale(0.92)" fill="none" stroke="#61DAFB" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></g>
    <text x="310" y="430" fill="#61DAFB" font-weight="600">React · Tailwind · TypeScript</text>

    <!-- Backend -->
    <text x="88" y="488" fill="#9db4c7" font-weight="700">Backend</text>
    <g transform="translate(270,467) scale(0.92)" fill="none" stroke="#61DAFB" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></g>
    <text x="310" y="488" fill="#61DAFB" font-weight="600">Node.js · Laravel · PHP</text>

    <!-- DevOps -->
    <text x="88" y="546" fill="#9db4c7" font-weight="700">DevOps</text>
    <g transform="translate(270,525) scale(0.92)" fill="none" stroke="#61DAFB" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14" /><path d="m12 5 7 7-7 7" /></g>
    <text x="310" y="546" fill="#61DAFB" font-weight="600">Docker · AWS · CI/CD</text>
  </g>

  <!-- Footer -->
  <line x1="88" y1="576" x2="1112" y2="576" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1" />
  <text x="88" y="602" font-family="Segoe UI, Arial, sans-serif" font-size="25" fill="#61DAFB">academy-soft.web.app</text>
  <text x="1112" y="602" text-anchor="end" font-family="Segoe UI, Arial, sans-serif" font-size="24" fill="#9db4c7">Omar Rodrigo Mamani Capcha</text>
